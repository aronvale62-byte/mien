<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌐 Mi Sitio Personal - Publicaciones</title>
    <style>
        /* ============ RESET Y VARIABLES RETRO ============ */
        :root {
            --bg: #c0c0c0;
            --surface: #ece9d8;
            --text: #000000;
            --text-light: #333333;
            --accent: #000080;
            --accent-hover: #0000cc;
            --accent-light: #d4d0c8;
            --border: #808080;
            --border-light: #ffffff;
            --border-dark: #404040;
            --shadow-sm: none;
            --shadow: inset 1px 1px 0 #fff, inset -1px -1px 0 #808080;
            --shadow-lg: inset 2px 2px 0 #fff, inset -2px -2px 0 #808080;
            --radius: 0px;
            --radius-sm: 0px;
            --transition: none;
            --font: 'Times New Roman', Times, serif;
            --font-ui: 'Microsoft Sans Serif', 'Segoe UI', Arial, sans-serif;
            --danger: #cc0000;
            --danger-hover: #990000;
            --success: #008000;
            --tag-bg: #ffffcc;
            --tag-border: #c0c0c0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23c0c0c0"/><path d="M0 0L100 100M100 0L0 100" stroke="%23b0b0b0" stroke-width="0.5"/></svg>');
            background-size: 4px 4px;
        }

        /* ============ HEADER CLÁSICO ============ */
        header {
            background: var(--surface);
            border-bottom: 3px solid var(--border);
            padding: 0.8rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
            box-shadow: inset 0 -1px 0 #fff;
            border-top: 2px solid #fff;
            border-left: 2px solid #fff;
            border-right: 2px solid #808080;
        }
        header .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--accent);
            cursor: pointer;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            text-shadow: 1px 1px 0 #fff;
            letter-spacing: -0.5px;
            user-select: none;
            background: linear-gradient(to bottom, #ffcc00, #ff9900);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(1px 1px 0 #000);
        }
        header .logo span {
            font-family: var(--font-ui);
            font-weight: bold;
            -webkit-text-fill-color: initial;
            color: #000;
            text-shadow: 1px 1px 0 #fff;
            background: none;
        }
        .header-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        /* ============ BOTONES RETRO ============ */
        .btn {
            padding: 0.5rem 1rem;
            border-radius: 2px;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            text-decoration: none;
            font-family: var(--font-ui);
            background: var(--surface);
            color: #000;
            box-shadow: var(--shadow-sm);
            transition: none;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        .btn:active {
            border-color: #808080 #ffffff #ffffff #808080;
            background: #d0c8b8;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: #ffffff #000080 #000080 #ffffff;
        }
        .btn-primary:active {
            background: #0000cc;
        }
        .btn-outline {
            background: var(--surface);
            color: #000;
        }
        .btn-sm {
            padding: 0.3rem 0.7rem;
            font-size: 0.75rem;
        }
        .btn-danger {
            background: #cc0000;
            color: #fff;
            border-color: #ffffff #660000 #660000 #ffffff;
        }
        .btn-danger:active {
            background: #990000;
        }
        .btn-success {
            background: #008000;
            color: #fff;
            border-color: #ffffff #004d00 #004d00 #ffffff;
        }

        /* ============ MAIN CONTENT ============ */
        main {
            max-width: 950px;
            margin: 1.5rem auto;
            padding: 0 1.5rem;
        }
        .section-title {
            font-size: 1.6rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
            color: var(--accent);
            font-family: var(--font-ui);
            text-shadow: 1px 1px 0 #fff;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.3rem;
        }
        .no-posts {
            text-align: center;
            padding: 3rem 2rem;
            background: var(--surface);
            border: 3px groove var(--border);
            color: #333;
            font-family: var(--font-ui);
        }
        .no-posts .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        /* ============ TARJETAS RETRO ============ */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
        }
        .post-card {
            background: var(--surface);
            border: 3px groove #fff;
            padding: 1rem;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            cursor: pointer;
            transition: none;
            font-family: var(--font);
        }
        .post-card:hover {
            background: #fffff0;
            border-color: #ffcc00;
        }
        .post-card .post-date {
            font-size: 0.75rem;
            color: #555;
            font-weight: bold;
            border-bottom: 1px dotted #999;
            padding-bottom: 0.2rem;
            font-family: var(--font-ui);
        }
        .post-card .post-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent);
            text-decoration: underline;
            font-family: var(--font);
        }
        .post-card .post-excerpt {
            color: #222;
            font-size: 0.9rem;
            flex-grow: 1;
        }
        .post-card .post-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            margin-top: 0.3rem;
        }
        .post-card .tag {
            background: var(--tag-bg);
            border: 1px solid var(--tag-border);
            padding: 0.15rem 0.5rem;
            font-size: 0.7rem;
            font-weight: bold;
            font-family: var(--font-ui);
            color: #333;
            text-transform: uppercase;
        }
        .post-card .card-actions {
            display: flex;
            gap: 0.4rem;
            margin-top: 0.3rem;
            border-top: 1px dashed #999;
            padding-top: 0.4rem;
        }

        /* ============ MODAL / VENTANA RETRO ============ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal {
            background: var(--surface);
            border: 4px groove #fff;
            padding: 1.8rem;
            width: 100%;
            max-width: 580px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
            font-family: var(--font-ui);
            position: relative;
        }
        .modal h2 {
            margin-bottom: 1rem;
            font-size: 1.3rem;
            font-weight: bold;
            background: var(--accent);
            color: #fff;
            padding: 0.25rem 0.5rem;
            display: inline-block;
            letter-spacing: 0.5px;
        }
        .modal .form-group {
            margin-bottom: 0.8rem;
        }
        .modal label {
            display: block;
            font-weight: bold;
            margin-bottom: 0.2rem;
            font-size: 0.8rem;
            color: #000;
            text-transform: uppercase;
        }
        .modal input,
        .modal textarea {
            width: 100%;
            padding: 0.4rem 0.6rem;
            border: 2px inset #808080;
            background: #fff;
            font-family: var(--font);
            font-size: 0.9rem;
            resize: vertical;
            border-radius: 0;
            color: #000;
        }
        .modal textarea {
            min-height: 120px;
        }
        .modal .form-actions {
            display: flex;
            gap: 0.6rem;
            justify-content: flex-end;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        .modal .hint {
            font-size: 0.7rem;
            color: #555;
            margin-top: 0.15rem;
            font-style: italic;
        }

        /* ============ LOGIN RETRO ============ */
        .login-box {
            max-width: 360px;
            margin: 4rem auto;
            background: var(--surface);
            padding: 2rem;
            border: 4px groove #fff;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
            text-align: center;
            font-family: var(--font-ui);
            background: #ece9d8 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="1.5" fill="%23c0c0c0" opacity="0.5"/></svg>');
        }
        .login-box h1 {
            margin-bottom: 0.3rem;
            font-size: 1.4rem;
            color: var(--accent);
            background: #fff;
            border: 2px groove #ccc;
            padding: 0.2rem;
        }
        .login-box .subtitle {
            color: #333;
            margin-bottom: 1.3rem;
            font-size: 0.8rem;
            font-style: italic;
        }
        .login-box input {
            width: 100%;
            padding: 0.5rem;
            border: 2px inset #808080;
            font-size: 0.95rem;
            text-align: center;
            font-family: var(--font-ui);
            margin-bottom: 0.8rem;
            background: #fff;
        }
        .login-error {
            color: #cc0000;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 0.3rem;
            display: none;
        }
        .login-error.visible {
            display: block;
        }

        /* ============ DETALLE PUBLICACIÓN ============ */
        .post-detail {
            background: var(--surface);
            border: 3px groove #fff;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            font-family: var(--font);
        }
        .post-detail .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: var(--accent);
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            text-decoration: underline;
            font-family: var(--font-ui);
        }
        .post-detail h1 {
            font-size: 1.8rem;
            margin-bottom: 0.4rem;
            color: var(--accent);
            text-decoration: underline;
        }
        .post-detail .meta {
            color: #333;
            font-size: 0.8rem;
            margin-bottom: 1.2rem;
            font-weight: bold;
            border-bottom: 1px dashed #999;
            padding-bottom: 0.3rem;
        }
        .post-detail .content {
            font-size: 1rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            background: #fff;
            padding: 0.8rem;
            border: 1px solid #ccc;
        }
        .post-detail .tags-row {
            margin-top: 1.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        /* ============ TABLA ADMIN ============ */
        .admin-table-container {
            background: var(--surface);
            border: 3px groove #fff;
            padding: 0.5rem;
            box-shadow: var(--shadow);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-family: var(--font-ui);
            font-size: 0.85rem;
            background: #fff;
        }
        th {
            background: var(--accent);
            color: #fff;
            padding: 0.5rem 0.7rem;
            text-align: left;
            font-weight: bold;
            text-transform: uppercase;
            border: 2px outset #6060a0;
        }
        td {
            padding: 0.4rem 0.7rem;
            border-bottom: 1px solid #ccc;
            border-right: 1px solid #ddd;
        }
        tr:hover td {
            background: #f0f0d0;
        }
        .admin-actions-cell {
            display: flex;
            gap: 0.3rem;
            flex-wrap: wrap;
        }

        /* ============ MARQUESINA (DETALLE OPCIONAL) ============ */
        .marquee {
            background: #000080;
            color: #ffff00;
            font-weight: bold;
            font-family: var(--font-ui);
            padding: 0.3rem 0;
            margin: 0 auto 1.5rem;
            overflow: hidden;
            white-space: nowrap;
            border: 2px inset #808080;
            max-width: 950px;
        }
        .marquee span {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 18s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        /* ============ TOAST RETRO ============ */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #ffffcc;
            color: #000;
            padding: 0.6rem 1.2rem;
            border: 2px solid #000;
            font-weight: bold;
            font-size: 0.85rem;
            font-family: var(--font-ui);
            z-index: 999;
            box-shadow: 4px 4px 0 #000;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.3s forwards;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes toastOut {
            from { opacity: 1; }
            to { opacity: 0; transform: translateY(20px); }
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 600px) {
            header {
                padding: 0.5rem;
            }
            .posts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== HEADER ==================== -->
    <header>
        <div class="logo" onclick="mostrarInicio()" title="Inicio (estilo 2000)">💾 Mi<span>Portal</span></div>
        <div class="header-actions" id="headerActions"></div>
    </header>

    <!-- ==================== MARQUESINA BIENVENIDA ==================== -->
    <div class="marquee">
        <span>✨ Bienvenido a mi sitio personal! ·· Publica tus trabajos artesanales ·· Última actualización: 2026 ·· Visita el panel de administración para gestionar contenido ✨</span>
    </div>

    <!-- ==================== CONTENEDOR PRINCIPAL ==================== -->
    <main id="mainContent"></main>

    <!-- ==================== SCRIPTS (FUNCIONALIDAD COMPLETA) ==================== -->
    <script>
        (function() {
            // ============ CONFIGURACIÓN ============
            const CONTRASEÑA_ADMIN = '2000'; // Cambia esta contraseña
            const STORAGE_KEY = 'mi_sitio_publicaciones_retro';
            const SESSION_KEY = 'mi_sitio_sesion_admin_retro';

            // ============ ESTADO ============
            let publicaciones = [];
            let sesionAdmin = false;
            let vistaActual = 'inicio';
            let publicacionSeleccionada = null;

            const headerActions = document.getElementById('headerActions');
            const mainContent = document.getElementById('mainContent');

            // ============ INICIALIZACIÓN ============
            function inicializar() {
                cargarPublicaciones();
                verificarSesion();
                renderizar();
            }

            function cargarPublicaciones() {
                const datos = localStorage.getItem(STORAGE_KEY);
                if (datos) {
                    try {
                        publicaciones = JSON.parse(datos);
                    } catch (e) {
                        publicaciones = [];
                    }
                } else {
                    publicaciones = [
                        {
                            id: generarId(),
                            titulo: 'Mi primera página web (1999)',
                            contenido: 'Esta fue mi primera incursión en HTML sin usar tablas. Aprendí a usar marquesinas y fuentes coloridas.\n\nRecuerdo emocionarme con los gifs animados de llamas y los fondos de estrellas.',
                            etiquetas: 'HTML,GeoCities,Retro',
                            fecha: '1999-06-12T10:20:00'
                        },
                        {
                            id: generarId(),
                            titulo: 'Manual de Windows 98',
                            contenido: 'Escribí un tutorial sobre cómo instalar Windows 98 desde 22 diskettes. Incluye consejos para liberar memoria RAM y personalizar el escritorio con temas Plus!',
                            etiquetas: 'Windows,Tutorial,Sistemas',
                            fecha: '2001-03-05T15:45:00'
                        },
                        {
                            id: generarId(),
                            titulo: 'Fotografías con cámara analógica',
                            contenido: 'Escaneé mis fotos reveladas del viaje a la playa. Les puse bordes blancos y las comprimí en JPEG al 40% para que cargaran rápido en modem 56k.',
                            etiquetas: 'Fotografía,Analógico,Viajes',
                            fecha: '2003-11-20T09:00:00'
                        }
                    ];
                    guardarPublicaciones();
                }
            }

            function guardarPublicaciones() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(publicaciones));
            }

            function generarId() {
                return 'retro_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
            }

            function verificarSesion() {
                sesionAdmin = sessionStorage.getItem(SESSION_KEY) === 'activa';
            }

            function iniciarSesion() {
                sessionStorage.setItem(SESSION_KEY, 'activa');
                sesionAdmin = true;
                vistaActual = 'admin';
                publicacionSeleccionada = null;
                renderizar();
            }

            function cerrarSesion() {
                sessionStorage.removeItem(SESSION_KEY);
                sesionAdmin = false;
                vistaActual = 'inicio';
                publicacionSeleccionada = null;
                renderizar();
                mostrarToast('👋 Sesión cerrada');
            }

            // ============ RENDERIZADO ============
            function renderizar() {
                renderizarHeader();
                renderizarMain();
            }

            function renderizarHeader() {
                if (sesionAdmin) {
                    headerActions.innerHTML = `
                        <button class="btn btn-outline btn-sm" onclick="window._acciones.irInicio()">🏠 Inicio</button>
                        <button class="btn btn-primary btn-sm" onclick="window._acciones.irAdmin()">⚙️ Admin</button>
                        <button class="btn btn-outline btn-sm" onclick="window._acciones.cerrarSesion()">🚪 Salir</button>
                    `;
                } else {
                    headerActions.innerHTML = `
                        <button class="btn btn-outline btn-sm" onclick="window._acciones.mostrarLogin()">🔑 Admin</button>
                    `;
                }
            }

            function renderizarMain() {
                if (vistaActual === 'detalle' && publicacionSeleccionada) {
                    renderizarDetalle();
                } else if (vistaActual === 'admin' && sesionAdmin) {
                    renderizarAdmin();
                } else {
                    renderizarInicio();
                }
            }

            function renderizarInicio() {
                vistaActual = 'inicio';
                publicacionSeleccionada = null;
                const publicacionesOrdenadas = [...publicaciones].sort((a, b) => new Date(b.fecha) - new Date(a.fecha));

                if (publicacionesOrdenadas.length === 0) {
                    mainContent.innerHTML = `
                        <div class="no-posts">
                            <div class="icon">📭</div>
                            <p><b>No hay publicaciones todavía.</b></p>
                            <p style="font-size:0.9rem;">Vuelve pronto, ¡estamos construyendo!</p>
                        </div>
                    `;
                } else {
                    const tarjetas = publicacionesOrdenadas.map(p => {
                        const fechaFormateada = new Date(p.fecha).toLocaleDateString('es-ES', {
                            year: 'numeric', month: 'long', day: 'numeric'
                        });
                        const etiquetas = p.etiquetas ? p.etiquetas.split(',').map(t => t.trim()).filter(t => t) : [];
                        const excerpt = p.contenido.length > 150 ? p.contenido.substring(0, 150) + '...' : p.contenido;
                        return `
                            <div class="post-card" onclick="window._acciones.verDetalle('${p.id}')" title="Ver publicación">
                                <div class="post-date">📅 ${fechaFormateada}</div>
                                <div class="post-title">${escaparHTML(p.titulo)}</div>
                                <div class="post-excerpt">${escaparHTML(excerpt)}</div>
                                ${etiquetas.length ? `<div class="post-tags">${etiquetas.map(t => `<span class="tag">${escaparHTML(t)}</span>`).join('')}</div>` : ''}
                            </div>
                        `;
                    }).join('');

                    mainContent.innerHTML = `
                        <h2 class="section-title">📁 Mis Publicaciones</h2>
                        <div class="posts-grid">${tarjetas}</div>
                    `;
                }
            }

            function renderizarDetalle() {
                if (!publicacionSeleccionada) { renderizarInicio(); return; }
                vistaActual = 'detalle';
                const p = publicacionSeleccionada;
                const fechaFormateada = new Date(p.fecha).toLocaleDateString('es-ES', {
                    year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
                });
                const etiquetas = p.etiquetas ? p.etiquetas.split(',').map(t => t.trim()).filter(t => t) : [];

                mainContent.innerHTML = `
                    <div class="post-detail">
                        <span class="back-link" onclick="window._acciones.irInicio()">← Volver al índice</span>
                        <h1>${escaparHTML(p.titulo)}</h1>
                        <div class="meta">📅 ${fechaFormateada}</div>
                        <div class="content">${escaparHTML(p.contenido)}</div>
                        ${etiquetas.length ? `<div class="tags-row">${etiquetas.map(t => `<span class="tag">${escaparHTML(t)}</span>`).join('')}</div>` : ''}
                    </div>
                `;
            }

            function renderizarAdmin() {
                vistaActual = 'admin';
                publicacionSeleccionada = null;
                const ordenadas = [...publicaciones].sort((a, b) => new Date(b.fecha) - new Date(a.fecha));

                let filas = '';
                if (ordenadas.length === 0) {
                    filas = `<tr><td colspan="4" style="text-align:center;padding:2rem;">📼 No hay publicaciones. ¡Crea la primera!</td></tr>`;
                } else {
                    filas = ordenadas.map(p => {
                        const fecha = new Date(p.fecha).toLocaleDateString('es-ES', { year:'numeric', month:'short', day:'numeric' });
                        return `
                            <tr>
                                <td><b>${escaparHTML(p.titulo)}</b></td>
                                <td>${fecha}</td>
                                <td>${escaparHTML(p.etiquetas || '—')}</td>
                                <td class="admin-actions-cell">
                                    <button class="btn btn-outline btn-sm" onclick="window._acciones.editarPublicacion('${p.id}')">✏️ Editar</button>
                                    <button class="btn btn-danger btn-sm" onclick="window._acciones.eliminarPublicacion('${p.id}')">🗑️</button>
                                </td>
                            </tr>
                        `;
                    }).join('');
                }

                mainContent.innerHTML = `
                    <h2 class="section-title">⚙️ Panel de Control</h2>
                    <div style="margin-bottom:1rem;display:flex;gap:0.6rem;flex-wrap:wrap;">
                        <button class="btn btn-primary" onclick="window._acciones.crearPublicacion()">➕ Nueva Publicación</button>
                        <button class="btn btn-outline" onclick="window._acciones.irInicio()">👁️ Vista pública</button>
                    </div>
                    <div class="admin-table-container">
                        <table>
                            <thead>
                                <tr><th>Título</th><th>Fecha</th><th>Etiquetas</th><th>Acciones</th></tr>
                            </thead>
                            <tbody>${filas}</tbody>
                        </table>
                    </div>
                `;
            }

            // ============ MODALES ============
            function mostrarLogin() {
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML = `
                    <div class="modal login-box">
                        <h1>🔐 ACCESO</h1>
                        <p class="subtitle">Ingrese la clave secreta</p>
                        <input type="password" id="inputPassword" placeholder="Contraseña" autofocus>
                        <div class="login-error" id="loginError">Contraseña incorrecta</div>
                        <button class="btn btn-primary" style="width:100%;justify-content:center;" id="btnLogin">Ingresar</button>
                        <button class="btn btn-outline btn-sm" style="margin-top:0.6rem;width:100%;" id="btnCancelLogin">Cancelar</button>
                    </div>
                `;
                document.body.appendChild(overlay);

                const inputPass = overlay.querySelector('#inputPassword');
                const errorEl = overlay.querySelector('#loginError');
                const cerrar = () => overlay.remove();

                overlay.addEventListener('click', e => { if (e.target === overlay) cerrar(); });
                overlay.querySelector('#btnCancelLogin').addEventListener('click', cerrar);

                const intentar = () => {
                    if (inputPass.value === CONTRASEÑA_ADMIN) {
                        cerrar();
                        iniciarSesion();
                        mostrarToast('✅ Bienvenido administrador');
                    } else {
                        errorEl.classList.add('visible');
                        inputPass.value = '';
                        inputPass.focus();
                    }
                };
                overlay.querySelector('#btnLogin').addEventListener('click', intentar);
                inputPass.addEventListener('keydown', e => { if (e.key === 'Enter') intentar(); });
            }

            function mostrarFormularioPublicacion(publicacionExistente = null) {
                const esEdicion = !!publicacionExistente;
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML = `
                    <div class="modal">
                        <h2>${esEdicion ? '✎ Editar' : '✚ Nueva'} publicación</h2>
                        <div class="form-group">
                            <label>Título:</label>
                            <input type="text" id="inputTitulo" value="${escaparHTML(esEdicion ? publicacionExistente.titulo : '')}" maxlength="200">
                        </div>
                        <div class="form-group">
                            <label>Contenido:</label>
                            <textarea id="inputContenido">${escaparHTML(esEdicion ? publicacionExistente.contenido : '')}</textarea>
                        </div>
                        <div class="form-group">
                            <label>Etiquetas (separadas por comas):</label>
                            <input type="text" id="inputEtiquetas" value="${escaparHTML(esEdicion ? (publicacionExistente.etiquetas || '') : '')}">
                        </div>
                        <div class="form-group">
                            <label>Fecha:</label>
                            <input type="datetime-local" id="inputFecha" value="${esEdicion ? publicacionExistente.fecha : new Date().toISOString().slice(0,16)}">
                        </div>
                        <div class="form-actions">
                            <button class="btn btn-outline" id="btnCancelForm">Cancelar</button>
                            <button class="btn btn-primary" id="btnSaveForm">${esEdicion ? 'Guardar' : 'Publicar'}</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(overlay);

                const cerrar = () => overlay.remove();
                overlay.addEventListener('click', e => { if (e.target === overlay) cerrar(); });
                overlay.querySelector('#btnCancelForm').addEventListener('click', cerrar);

                overlay.querySelector('#btnSaveForm').addEventListener('click', () => {
                    const titulo = overlay.querySelector('#inputTitulo').value.trim();
                    const contenido = overlay.querySelector('#inputContenido').value.trim();
                    if (!titulo) { mostrarToast('⚠️ Falta el título'); return; }
                    if (!contenido) { mostrarToast('⚠️ Falta el contenido'); return; }

                    const datos = {
                        titulo,
                        contenido,
                        etiquetas: overlay.querySelector('#inputEtiquetas').value.trim(),
                        fecha: overlay.querySelector('#inputFecha').value || new Date().toISOString().slice(0,16)
                    };

                    if (esEdicion) {
                        const idx = publicaciones.findIndex(p => p.id === publicacionExistente.id);
                        if (idx !== -1) publicaciones[idx] = { ...publicaciones[idx], ...datos };
                        mostrarToast('✅ Actualizado');
                    } else {
                        publicaciones.push({ id: generarId(), ...datos });
                        mostrarToast('🎉 Publicado');
                    }
                    guardarPublicaciones();
                    cerrar();
                    vistaActual = 'admin';
                    renderizar();
                });
                setTimeout(() => overlay.querySelector('#inputTitulo')?.focus(), 100);
            }

            function confirmarEliminacion(id) {
                const pub = publicaciones.find(p => p.id === id);
                if (!pub) return;
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML = `
                    <div class="modal" style="max-width:400px;text-align:center;">
                        <h2>⚠️ Eliminar</h2>
                        <p>¿Estás seguro de borrar <b>"${escaparHTML(pub.titulo)}"</b>?</p>
                        <div class="form-actions" style="justify-content:center;">
                            <button class="btn btn-outline" id="btnCancelDel">Cancelar</button>
                            <button class="btn btn-danger" id="btnConfirmDel">Eliminar</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(overlay);
                const cerrar = () => overlay.remove();
                overlay.addEventListener('click', e => { if (e.target === overlay) cerrar(); });
                overlay.querySelector('#btnCancelDel').addEventListener('click', cerrar);
                overlay.querySelector('#btnConfirmDel').addEventListener('click', () => {
                    publicaciones = publicaciones.filter(p => p.id !== id);
                    guardarPublicaciones();
                    cerrar();
                    mostrarToast('🗑️ Publicación eliminada');
                    vistaActual = 'admin';
                    renderizar();
                });
            }

            function mostrarToast(mensaje) {
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = mensaje;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2700);
            }

            function escaparHTML(str) {
                if (!str) return '';
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ============ ACCIONES GLOBALES ============
            window._acciones = {
                irInicio: () => { vistaActual = 'inicio'; publicacionSeleccionada = null; renderizar(); },
                irAdmin: () => {
                    if (!sesionAdmin) { mostrarLogin(); return; }
                    vistaActual = 'admin'; publicacionSeleccionada = null; renderizar();
                },
                verDetalle: (id) => {
                    const pub = publicaciones.find(p => p.id === id);
                    if (pub) { publicacionSeleccionada = pub; vistaActual = 'detalle'; renderizar(); window.scrollTo({top:0,behavior:'smooth'}); }
                },
                mostrarLogin: () => mostrarLogin(),
                cerrarSesion: () => cerrarSesion(),
                crearPublicacion: () => { if (sesionAdmin) mostrarFormularioPublicacion(null); },
                editarPublicacion: (id) => {
                    const pub = publicaciones.find(p => p.id === id);
                    if (pub && sesionAdmin) mostrarFormularioPublicacion(pub);
                },
                eliminarPublicacion: (id) => { if (sesionAdmin) confirmarEliminacion(id); }
            };

            inicializar();
            console.log('🕹️ Sitio retro listo. Contraseña admin: admin123');
        })();
    </script>
</body>
</html>
